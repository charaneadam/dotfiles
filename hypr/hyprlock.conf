# Minimal hyprlock config for blur, input, and clock
background {
    monitor = 
    path = screenshot
    color = rgba(25, 20, 20, 1.0) 
    blur_passes = 3
    blur_size = 7
}

input-field {
    monitor = 
    size = 250, 60
    # ... (other styling properties like color, font, position) ...
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M:%S')" 
    font_family = JetBrainsMono Nerd Font Mono
    font_size = 60
    # ... (other styling properties) ...
    position = 0, 100
    halign = center
    valign = center
}
